name: 機能提案
description: 新機能・改善案を提案する
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能提案ありがとうございます。実装を始める前に Issue で議論することを強く推奨します。
        特にアーキテクチャに影響する変更は ADR（`docs/decisions/`）の作成をお願いします。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題
      description: どのような課題があるか、現状の制約は何かを説明してください
      placeholder: "例: 添付ファイルが 50MB を超えるとメモリが不足して..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・変更を望みますか？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に検討した方法があれば記述してください
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: 関係するコンポーネント
      multiple: true
      options:
        - smtp-gateway
        - api-server
        - Web UI
        - Docker Compose / インフラ
        - ドキュメント
        - その他
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: その他の情報
      description: スクリーンショット・参考リンク・関連 Issue など
    validations:
      required: false
