name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smtp-gateway:
    name: smtp-gateway (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.24"]
    defaults:
      run:
        working-directory: services/smtp-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: services/smtp-gateway/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./cmd/server/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  api-server:
    name: api-server (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.24"]
    defaults:
      run:
        working-directory: services/api-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: services/api-server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./cmd/server/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check gofmt (smtp-gateway)
        run: |
          unformatted=$(gofmt -l services/smtp-gateway/)
          if [ -n "$unformatted" ]; then
            echo "以下のファイルが gofmt されていません:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check gofmt (api-server)
        run: |
          unformatted=$(gofmt -l services/api-server/)
          if [ -n "$unformatted" ]; then
            echo "以下のファイルが gofmt されていません:"
            echo "$unformatted"
            exit 1
          fi

  web:
    name: Web UI (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

  e2e:
    name: E2E (docker compose)
    runs-on: ubuntu-latest
    needs: [smtp-gateway, api-server]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: tests/e2e/go.sum

      - name: Start stack (MariaDB + smtp-gateway + Postfix + Mailpit + api-server)
        run: make api-up

      - name: Wait for services
        run: |
          wait_for() {
            local url="$1"
            for i in $(seq 1 60); do
              if curl -fsS "$url" >/dev/null 2>&1; then
                echo "OK: $url"
                return 0
              fi
              sleep 2
            done
            echo "TIMEOUT: $url" >&2
            return 1
          }
          wait_for http://localhost:8080/healthz
          wait_for http://localhost:8090/healthz
          wait_for http://localhost:8025/api/v1/info

      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          GOWORK: "off"
        run: go test -tags e2e -count=1 -v ./...

      - name: Dump service logs on failure
        if: failure()
        run: COMPOSE_PROFILES=storage,dev,api docker compose -f docker/docker-compose.yml logs --tail=200

      - name: Tear down
        if: always()
        run: make api-down
