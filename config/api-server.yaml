server:
  port: 8090
  shutdown_timeout_seconds: 30
  frontend_url: "http://localhost:3000"

database:
  driver: mariadb
  host: mariadb
  port: 3306
  name: mailshield
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime_minutes: 5

redis:
  # backend: セッション/OTP/パスワードリセットのバックエンド種別
  #   redis    : Redis（デフォルト）profile: api に含まれる
  #   mariadb  : MariaDB（Redis不要・単一ノード向け）
  backend: redis                        # redis | mariadb
  host: redis
  port: 6379
  db: 1

storage:
  endpoint: minio:9000           # api-server から MinIO への内部接続先
  public_endpoint: localhost:9000 # ブラウザからアクセスする際のエンドポイント（空なら endpoint をそのまま使用）
  # access_key / secret_key は環境変数 MINIO_ACCESS_KEY / MINIO_SECRET_KEY で設定すること
  # YAML に値を書かないことで、env 未設定時に明示的に接続エラーになる（サイレントな弱認証を防ぐ）
  bucket_eml: mailshield-eml
  bucket_attachments: mailshield-attachments
  use_ssl: false
  public_use_ssl: false
  presigned_url_expiry_hours: 1

# 認証は2つの独立した軸で決まる:
#   directory.source : ユーザー情報の真実の源 = ローカルログイン手段の選択（none | ldap | scim）
#   auth.sso_mode    : OIDC（SSO）の扱い（disabled | optional | required）
# 詳細・組み合わせの表は docs/specs/configuration.md の auth / directory.ldap を参照。
auth:
  sso_mode: disabled                    # disabled | optional | required
  providers:
    oidc: {}
      # OIDC を使う場合（sso_mode: optional か required にすること）
      # issuer: "https://your-idp.example.com/application/o/mailshield/"
      # client_id: "mailshield-api"
      # client_secret: ""   # 環境変数 OIDC_CLIENT_SECRET で設定
      # redirect_uri: "http://localhost:8090/api/v1/auth/callback"
      # scopes: [openid, email, profile, groups]
  group_mappings:                       # OIDC の groups claim → ロールのマッピング
    admin: "mailshield-admins"
    operator: "mailshield-operators"
    viewer: "mailshield-viewers"
  session:
    ttl_minutes: 480
    cookie_name: "mailshield_session"
    cookie_secure: false
  rate_limit:                           # 認証系エンドポイント（login / setup / forgot-password /
    enabled: true                       # reset-password / OTP）のクライアント IP 単位レート制限
    max_attempts: 10                    # ウィンドウあたりの許容リクエスト数
    window_seconds: 300                 # ウィンドウ長（秒）

# ユーザー情報の真実の源（directory.source）。role・display_name をどこが管理するかを決める。
#   none : 手動管理。ローカルログインは standalone（メール + bcrypt パスワード）
#   ldap : LDAP ディレクトリが真実の源。ローカルログインは LDAP bind 認証に切り替わる
#   scim : SCIM 同期が真実の源（未実装）。SCIM はパスワード検証の仕組みを持たないため
#          auth.sso_mode を optional/required にすることが必須
directory:
  source: none                          # none | ldap | scim
  ldap:
    # host: ldap.corp.local
    # port: 389
    # tls: none                    # none | starttls | ldaps
    # bind_dn: "cn=svc-mailshield,ou=Service Accounts,dc=corp,dc=local"
    # bind_password: ""            # 環境変数 LDAP_BIND_PASSWORD で設定すること
    # base_dn: "ou=Users,dc=corp,dc=local"
    # user_filter: "(objectClass=person)"
    # attributes:
    #   email: mail
    #   display_name: displayName
    #   groups: memberOf           # Active Directory 標準。OpenLDAP は memberof overlay が必要
    # group_mappings:
    #   admin: "cn=MailShield-Admins,ou=Groups,dc=corp,dc=local"
    #   operator: "cn=MailShield-Operators,ou=Groups,dc=corp,dc=local"
    #   viewer: "cn=MailShield-Viewers,ou=Groups,dc=corp,dc=local"
    # sync_interval_minutes: 60
    # deactivate_missing_users: true  # 同期結果に含まれなくなった ldap ユーザーを無効化する
    # メールボックス割り当て（member=受信 / owner=送信 / approver=承認）をディレクトリ構造から
    # 自動反映する（任意）。rules は「線形チェーン（chain）」「Lua フック（lua）」「決め打ち（fixed）」
    # のいずれかを持つルールのリスト。同じ role に複数ルールを書ける（解決結果は合算される）。
    #
    # chain のステップ（分岐・ループなし・上から順に適用）:
    #   {self: <attr>}                起点: ユーザーの属性値（"dn" は DN 自身）
    #   {const: [v...]}               起点: 固定値の注入
    #   {regex: <pattern>}            値を正規表現で抽出・絞り込み（?P<value> / 先頭グループ / 全体）
    #   {search: {base_dn:, filter:}} 値ごとに filter の {value} を差し込み再検索 → エントリ
    #                                 （{value} は自動で LDAP エスケープされる）
    #   {attr: <name>}                エントリから属性値を取り出す → 値
    #   {to_mailbox: {domain:}}       終端: 値をメールボックスアドレスに確定（@ 無しは domain 補完）
    #
    # 典型構成: 「全ユーザーの個人メールボックス + 共有メールボックス + 全体承認者」
    # mailbox_provisioning:
    #   rules:
    #     # ① 個人メールボックス: 各ユーザー自身の mail 属性がメールボックスになり本人が owner
    #     - role: owner
    #       chain:
    #         - self: mail
    #         - to_mailbox: {}
    #
    #     # ② 共有メールボックス（memberOf 起点）: 所属グループの cn を抽出しドメイン補完
    #     #    （例: cn=sales → sales@internal.dev の member）
    #     - role: member
    #       chain:
    #         - self: memberOf
    #         - regex: '^cn=(?P<value>[^,]+),ou=Groups'
    #         - to_mailbox: { domain: internal.dev }
    #
    #     # ③ 共有メールボックスの管理者: 自分が owner 属性に載っているグループを検索し、
    #     #    そのグループを approver 担当にする（AD なら owner を managedBy に変える）
    #     - role: approver
    #       chain:
    #         - self: dn
    #         - search:
    #             base_dn: "ou=Groups,dc=internal,dc=dev"
    #             filter: "(&(objectClass=groupOfNames)(owner={value}))"
    #         - attr: cn
    #         - to_mailbox: { domain: internal.dev }
    #
    #     # ④ 全体承認者の決め打ち（ldap 管理下の全メールボックスに approver 付与）
    #     - role: approver
    #       fixed: [approver@internal.dev]
    #
    #     # ⑤ 変則ディレクトリ向け: Lua フック（resolve(user) が {{mailbox=, role=}} を返す）
    #     # - role: member
    #     #   lua: /app/config/ldap-hooks/custom.lua

# メールボックス機能ロール: member=受信担当 / owner=送信担当 / approver=承認担当。
# メールボックス自体の管理はシステム RBAC（operator/admin）が担う。
mailbox_policy:
  inbound_quarantine:
    visible_to: [member]    # To=内部ドメイン → 受信担当(member)が閲覧可
    release_by: [member]    # To=内部ドメイン → 受信担当(member)が再配送可
  outbound_quarantine:
    visible_to: [owner]     # From=内部ドメイン → 送信担当(owner)が閲覧可
    release_by: [owner]     # From=内部ドメイン → 送信担当(owner)が再配送可

attachment_download:
  auth_mode:
    # mode=auth のとき、どのメールボックスロールのユーザーにダウンロードを許可するか。
    # 空の場合は member/owner/admin の全ロールを許可する。
    allowed_roles: [member, owner, admin]

# システムが送信するメール（通知・OTP・隔離解放）の共通 SMTP 設定
notification:
  from_address: noreply@mailshield.internal   # システムメール共通の送信元アドレス
  # 開発環境: Mailpit へ直接送信（postfix 経由にすると content_filter で smtp-gateway を通るため）
  # 本番環境: 社内 SMTP リレーを指定する
  smtp_host: mailpit
  smtp_port: 1025
  starttls: false
  auth_user: ""
  auth_pass: ""                               # 環境変数 NOTIFICATION_AUTH_PASS で上書き可
  # reinject_host / reinject_port は mailshield.yaml の reinject 設定から自動継承される。
  # この api-server.yaml で明示的に上書きしたい場合のみ記載する。
  # reinject_host: mailpit
  # reinject_port: 1025

approval:
  # 承認依頼の有効期限（時間）。期限を過ぎると status=expired に自動更新される。
  expiry_hours: 72
  # 承認者が個人設定されていない場合のフォールバック承認者メールアドレス。
  # 空の場合、承認者を解決できないメールは approval アクションを無視して配送される。
  global_approver_email: ""
  # 承認画面 URL のベース（通知メール内リンク生成に使用）。
  # 本番環境: https://mailshield.example.com のように Web UI の公開 URL を指定する。
  base_url: "http://localhost:3000"

  notification:
    # 承認通知メールの送信元（空の場合は notification.from_address を使用）
    from_address: ""
    from_name: "MailShield 承認システム"

    # 承認依頼通知（承認者向け）
    # enabled: true にすると policy が approval を返したタイミングで承認者へメールを送る
    request_enabled: true
    request_subject_template: "【要承認】メール送信の承認申請: {{.Subject}}"
    request_body_template: |
      MailShield より承認申請のお知らせです。

      以下のメールの送信について承認をお願いします。

      件名      : {{.Subject}}
      送信元    : {{.FromAddress}}
      宛先      : {{range .ToAddresses}}{{.}} {{end}}
      受信日時  : {{.ReceivedAt}}
      承認期限  : {{.ExpiresAt}}

      承認・却下はこちらから:
      {{.ApprovalURL}}

      ご不明な点はシステム管理者へお問い合わせください。

    # 承認結果通知（送信者向け・内部ユーザーのみ）
    result_enabled: true
    approved_subject_template: "【承認済み】あなたのメールが承認されました: {{.Subject}}"
    approved_body_template: |
      あなたが送信したメールが承認され、配送されました。

      件名    : {{.Subject}}
      宛先    : {{range .ToAddresses}}{{.}} {{end}}
      コメント: {{.Comment}}

    rejected_subject_template: "【却下】あなたのメールが却下されました: {{.Subject}}"
    rejected_body_template: |
      あなたが送信したメールは却下されました。

      件名    : {{.Subject}}
      宛先    : {{range .ToAddresses}}{{.}} {{end}}
      コメント: {{.Comment}}

      詳細はシステム管理者へお問い合わせください。

gateway:
  # smtp-gateway のヘルスポート URL（POST /simulate に使用）
  # docker-compose 環境では smtp-gateway:8080 がデフォルト
  url: "http://smtp-gateway:8080"

settings:
  # smtp-gateway が読む設定ファイルのパス（設定画面から GUI で編集するファイル）
  # docker-compose で api-server と smtp-gateway が同じ config ボリュームをマウントする
  policy_file: /app/config/policy.yaml
  smtp_gateway_config_file: /app/config/mailshield.yaml

# 設定（ワーカーインスタンス / ルーティング / 変数）の源泉（ADR 008 ③-2）。
#   db   : DB が真実。起動時に seed しない（WebUI 編集が永続・ロールバック可）
#   file : ファイルが真実。起動時に bundle_dir のマニフェスト（*.json・エクスポート形式）を
#          DB へ seed（upsert+prune）する。単一レプリカだけが GET_LOCK で seed する。
#          WebUI 編集は再起動で消える（永続化は「エクスポート → bundle_dir へ配置 → 再起動」）。
config:
  source: db                          # db | file（省略時 db）
  bundle_dir: /app/config/config.d    # file モード時のマニフェスト置き場

log:
  level: info
  format: json
