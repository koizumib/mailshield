# 受信ルート（外部 → 内部ドメイン宛て）
#
# 変更が必要な項目:
#   match.to                    ← 自組織の受信ドメインに変更する
#   workers.inspect[].enabled   ← 使用するワーカーを有効化する
#   workers.transform[].enabled ← 使用するワーカーを有効化する
name: inbound
direction: inbound
match:
  # 自組織の受信ドメインに変更すること（例: "@example\\.com$"）
  to: "@internal\\.test$"
  # any: 宛先のいずれか1つがマッチ / all: 全宛先がマッチ
  to_match: any
workers:
  inspect:
    # timeout_seconds: このワーカーが応答しない場合にスキップするまでの時間（秒）
    # 全ワーカーは並列実行される
    - name: subject-virus-inspector  # 開発用ダミー（本番では false に）
      enabled: true
      timeout_seconds: 5
    - name: av-worker               # ClamAV ウイルス検査（profile: scanners 必要）
      enabled: true
      timeout_seconds: 30
    - name: dlp-worker              # Apache Tika DLP 検査（受信時は通常無効）
      enabled: false
      timeout_seconds: 60
    - name: header-inspector        # ヘッダーなりすまし・SPF/DKIM異常検査
      enabled: true
      timeout_seconds: 5
    - name: url-worker              # URL レピュテーション検査
      enabled: true
      timeout_seconds: 15
    - name: qr-worker               # QR コード埋め込みURL検査
      enabled: true
      timeout_seconds: 15
  transform:
    # order の昇順で直列実行される。前のワーカーの出力が次の入力になる。
    - name: sanitize-worker         # HTML 無害化（不審スクリプト・属性を除去）
      enabled: true
      order: 1
    - name: url-rewrite-worker      # URL をプロキシ経由に書き換え
      enabled: true
      order: 2
    - name: subject-virus-transformer  # 開発用ダミー（本番では false に）
      enabled: true
      order: 3
    - name: disclaimer-worker       # メールフッター追加（受信時は通常無効）
      enabled: false
      order: 4
    - name: filesep-worker          # 添付ファイル分離（MinIO + ダウンロードリンク挿入）
      enabled: true
      order: 5
    - name: arc-sealer              # ARC 署名（変換後に付与・必ず最後に配置すること）
      enabled: false                # 有効化には config/arc/private.pem と DNS TXT が必要
      order: 6
# policy は同ディレクトリの policy.yaml / policy.lua を自動参照する
