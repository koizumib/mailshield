# filesep-worker 設定
#
# 添付ファイルを分離して MinIO に保存し、ダウンロードリンクをメール本文に挿入する。
# フェーズ2: MinIO 署名付き URL を使用（フェーズ3: Web UI の一時キー URL に差し替え予定）

# 配送モード
# inline   : 元のメール本文冒頭にリンクを挿入して配送
# separate : 元のメールと別にリンクのみ記載した通知メールを配送
mode: inline

# テンプレートファイルパス（省略時はデフォルトテンプレートを使用）
inline_template: /app/config/workers/conf/filesep_inline_template.txt
separate_template: /app/config/workers/conf/filesep_separate_template.txt

# 署名付き URL の有効期限（時間）
link_expiry_hours: 72

# 分離対象フィルタ
# min_size_bytes: 0 → サイズ制限なし（すべてのサイズが対象）
# extensions: [] → すべての拡張子が対象
min_size_bytes: 0
extensions: []
# extensions の指定例（この拡張子のみ分離する場合）:
#   - .exe
#   - .zip
#   - .pdf
#   - .docx
#   - .xlsm

# separate モードで通知メールを送る際の送信元アドレス
# inline モードでは使用しない
separate_from: mailshield-noreply@internal.test

# ダウンロードリンクのベース URL
# メール本文に挿入されるリンクの先頭に付与される
# 例: http://localhost:3000 → http://localhost:3000/files/{download_token}
frontend_url: http://localhost:3000
