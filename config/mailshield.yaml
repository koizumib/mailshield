# MailShield smtp-gateway 設定
#
# ここに書いた値が mailshield.default.yaml を上書きします。
# 全パラメータの説明は mailshield.default.yaml を参照してください。
#
# デフォルト値（mailshield.default.yaml）はスタンドアロン実行向けの localhost が設定されています。
# Docker 環境では環境変数（DB_HOST, MINIO_ENDPOINT 等）でサービスホスト名が自動的に上書きされます。

# ─── アクセス制御 ────────────────────────────────────────────────────────────

# smtp-gateway への接続を許可するホスト/IPを設定してください。
# Docker 利用時は Postfix コンテナのホスト名を追加します（例: postfix）。
# バイナリ直接実行時は接続元の IP または CIDR を設定します。
# server:
#   trusted_sources:
#     - 127.0.0.1
#     - 10.0.0.0/8

# ─── ルート定義 ──────────────────────────────────────────────────────────────
#
# ルートは config/routes.d/*.yaml で管理します（nginx の conf.d/ と同じ方式）。
# ファイル名のアルファベット順に評価されます（first-match-wins）。
#
#   routes.d/00-bounce/    変更不要（バウンス/DSN 専用）
#   routes.d/10-inbound/   route.yaml の match.to を自組織ドメインに変更する
#   routes.d/20-outbound/  route.yaml の match.from を自組織ドメインに変更する
#
# ルートを追加する場合は routes.d/ に新しいファイルを追加してください。
