# MailShield smtp-gateway 環境設定
#
# ここに書いた値が mailshield.default.yaml を上書きします。
# 全パラメータの説明は mailshield.default.yaml を参照してください。

# ─── 接続先 ─────────────────────────────────────────────────────────────────

database:
  host: mariadb
  user: mailshield
  password: mailshield      # 本番環境では ENV: DB_PASSWORD で設定すること

storage:
  endpoint: minio:9000
  access_key: minioadmin    # 本番環境では ENV: MINIO_ACCESS_KEY で設定すること
  secret_key: minioadmin    # 本番環境では ENV: MINIO_SECRET_KEY で設定すること

queue:
  host: rabbitmq
  user: mailshield
  password: mailshield      # 本番環境では ENV: RABBITMQ_PASSWORD で設定すること

notification:
  smtp_host: mailpit
  smtp_port: 1025
  from_address: noreply@mailshield.internal

reinject:
  host: mailpit
  port: 1025

# ─── アクセス制御 ────────────────────────────────────────────────────────────

server:
  trusted_sources:
    - postfix
    - postfix-submission
    - 127.0.0.1

# ─── ルート定義 ──────────────────────────────────────────────────────────────
#
# routes: は配列のため、このブロック全体が default.yaml の routes: を置換します。
# 変更が必要なもの:
#   - match.to / match.from: 自組織のドメインに変更する
#   - workers.inspect[].enabled: 使用するワーカーを有効化する
#   - workers.transform[].enabled: 使用するワーカーを有効化する

routes:
  - name: inbound
    direction: inbound
    match:
      to: "@internal\\.test$"
      to_match: any
    workers:
      inspect:
        - name: subject-virus-inspector
          enabled: true
          timeout_seconds: 5
        - name: av-worker
          enabled: true
          timeout_seconds: 30
        - name: dlp-worker
          enabled: false
          timeout_seconds: 60
        - name: header-inspector
          enabled: true
          timeout_seconds: 5
        - name: url-worker
          enabled: true
          timeout_seconds: 15
        - name: qr-worker
          enabled: true
          timeout_seconds: 15
      transform:
        - name: sanitize-worker
          enabled: true
          order: 1
        - name: url-rewrite-worker
          enabled: true
          order: 2
        - name: subject-virus-transformer
          enabled: true
          order: 3
        - name: disclaimer-worker
          enabled: false
          order: 4
        - name: filesep-worker
          enabled: true
          order: 5
        - name: arc-sealer
          enabled: false
          order: 6
    policy:
      rules_file: /app/config/policy-inbound.yaml

  - name: outbound
    direction: outbound
    match:
      from: "@internal\\.test$"
    workers:
      inspect:
        - name: dlp-worker
          enabled: true
          timeout_seconds: 60
        - name: av-worker
          enabled: false
          timeout_seconds: 30
        - name: subject-virus-inspector
          enabled: false
          timeout_seconds: 5
        - name: header-inspector
          enabled: false
          timeout_seconds: 5
        - name: url-worker
          enabled: false
          timeout_seconds: 15
        - name: qr-worker
          enabled: false
          timeout_seconds: 15
      transform:
        - name: sanitize-worker
          enabled: false
          order: 1
        - name: url-rewrite-worker
          enabled: false
          order: 2
        - name: subject-virus-transformer
          enabled: false
          order: 3
        - name: disclaimer-worker
          enabled: true
          order: 4
        - name: filesep-worker
          enabled: true
          order: 5
        - name: arc-sealer
          enabled: false
          order: 6
    policy:
      rules_file: /app/config/policy-outbound.yaml
