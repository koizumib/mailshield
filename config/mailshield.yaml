# MailShield smtp-gateway 環境設定
#
# ここに書いた値が mailshield.default.yaml を上書きします。
# 全パラメータの説明は mailshield.default.yaml を参照してください。

# ─── 接続先 ─────────────────────────────────────────────────────────────────

database:
  host: mariadb
  user: mailshield
  password: mailshield      # 本番環境では ENV: DB_PASSWORD で設定すること

storage:
  endpoint: minio:9000
  access_key: minioadmin    # 本番環境では ENV: MINIO_ACCESS_KEY で設定すること
  secret_key: minioadmin    # 本番環境では ENV: MINIO_SECRET_KEY で設定すること

queue:
  host: rabbitmq
  user: mailshield
  password: mailshield      # 本番環境では ENV: RABBITMQ_PASSWORD で設定すること

notification:
  smtp_host: mailpit
  smtp_port: 1025
  from_address: noreply@mailshield.internal

reinject:
  host: mailpit
  port: 1025

# ─── アクセス制御 ────────────────────────────────────────────────────────────

server:
  trusted_sources:
    - postfix
    - postfix-submission
    - 127.0.0.1

# ─── ルート定義 ──────────────────────────────────────────────────────────────
#
# ルートは config/routes.d/*.yaml で管理します（nginx の conf.d/ と同じ方式）。
# ファイル名のアルファベット順に評価されます（first-match-wins）。
#
#   00-bounce.yaml  ← 変更不要（バウンス/DSN 専用）
#   10-inbound.yaml ← match.to を自組織ドメインに変更する
#   20-outbound.yaml ← match.from を自組織ドメインに変更する
#
# ルートを追加する場合は routes.d/ に新しいファイルを追加してください。
