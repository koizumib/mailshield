# MailShield smtp-gateway 全パラメータリファレンス
#
# このファイルはすべてのパラメータとデフォルト値を定義します。
# 環境ごとに変更が必要な値のみ mailshield.yaml に記述してください。
# mailshield.yaml の値がこのファイルの値を上書きします（ただし routes: は配列のため全体置換）。
# 環境変数は YAML より優先されます（ENV_VAR 列を参照）。

# ─── SMTPサーバー ────────────────────────────────────────────────────────────

server:
  # SMTPの待受ポート。Postfix の content_filter 設定と合わせること。
  smtp_port: 10024

  # SMTP EHLO/HELO で返すホスト名
  smtp_hostname: smtp-gateway

  # 受け付けるメールの最大サイズ（MB）
  max_message_size_mb: 50

  # 1通あたりの最大RCPT数
  smtp_max_recipients: 100

  # SMTPコマンド読み取り / レスポンス書き込みのタイムアウト（秒）
  smtp_read_timeout_seconds: 30
  smtp_write_timeout_seconds: 30

  # メール1通の処理タイムアウト（秒）
  # 検査パイプライン・変換パイプライン・ポリシー評価の合計を含む。
  # 最も遅いワーカーの timeout_seconds よりも大きくすること。
  handler_timeout_seconds: 60

  # ヘルスチェックエンドポイントのポート（GET /healthz、POST /simulate）
  health_port: 8080

  # SIGTERMを受けてから既存セッションの終了を待つ最大時間（秒）
  shutdown_timeout_seconds: 30

  # HTTP ヘルスチェックサーバーのシャットダウンタイムアウト（秒）
  http_shutdown_timeout_seconds: 5

  # trusted_sources のホスト名を DNS 解決する際のタイムアウト（秒）
  dns_resolve_timeout_seconds: 3

  # 操作別タイムアウト（秒）
  storage_save_timeout_seconds: 15   # EML 保存（MinIO/FS）
  db_save_timeout_seconds: 5         # メタデータ DB 保存
  event_publish_timeout_seconds: 5   # mail.received イベント発行（webhook）
  simulate_timeout_seconds: 30       # POST /simulate ハンドラ全体

  # アーカイブリトライ設定
  archive_max_retries: 3             # 最大リトライ回数
  archive_retry_backoff_seconds: 2   # バックオフ基準秒数（線形: (attempt+1) × backoff）

  # smtp-gateway への SMTP 接続を許可するホスト/IP
  # CIDR 表記可（例: 172.17.0.0/16）。ホスト名は SMTP 接続ごとにオンデマンドで DNS 解決される。
  # Postfix 以外からの接続を受け付けないようにすること。
  trusted_sources:
    - 127.0.0.1

# ─── オブジェクトストレージ ──────────────────────────────────────────────────

storage:
  # ストレージバックエンド
  #   minio      : MinIO / S3互換（docker-compose profile: storage が必要）
  #   s3         : AWS S3（本番環境向け）
  #   filesystem : ローカルFS（MinIO不要・開発/単一ノード向け）
  backend: filesystem                   # ENV: なし（設定ファイルのみ）

  endpoint: localhost:9000              # ENV: MINIO_ENDPOINT
  access_key: minioadmin                # ENV: MINIO_ACCESS_KEY
  secret_key: minioadmin                # ENV: MINIO_SECRET_KEY
  use_ssl: false                        # ENV: MINIO_USE_SSL

  # EML（原本・処理済み）の保存バケット
  bucket_eml: mailshield-eml
  # 分離した添付ファイルの保存バケット
  bucket_attachments: mailshield-attachments

  # S3/MinIO リージョン（MinIO 単体では無視される。AWS S3 では必須）
  region: us-east-1

  # filesystem モード専用
  local_dir: ./data/eml
  # public_base_url: http://localhost:8090    # GetPresignedURL が返すURLのベース
  # filesystem モードで GetPresignedURL が生成する URL のパスセグメント。
  # api-server のルーティングと合わせること。
  public_path_prefix: /internal/files/

# ─── データベース ────────────────────────────────────────────────────────────

database:
  driver: mariadb                       # 現時点では mariadb のみ対応
  host: localhost                       # ENV: DB_HOST
  port: 3306                            # ENV: DB_PORT
  name: mailshield                      # ENV: DB_NAME
  user: mailshield                      # ENV: DB_USER
  password: ""                          # ENV: DB_PASSWORD

  # 接続プール設定
  # max_open_conns を上げると並列処理数が増えるが DB への負荷も増える
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime_minutes: 5
  # 起動時 DB 疎通確認タイムアウト（秒）
  ping_timeout_seconds: 5

# ─── メッセージキュー ────────────────────────────────────────────────────────

# mail.received 統合イベント通知（外部システム連携用・メールフローには影響しない）
events:
  # バックエンド
  #   webhook : イベントを HTTP POST で通知する（SIEM・自作コンシューマー向け）
  #   none    : イベント通知なし（デフォルト）
  backend: none
  webhook:
    url: ""                             # ENV: MAILSHIELD_WEBHOOK_URL（backend=webhook のとき必須）
    secret: ""                          # ENV: MAILSHIELD_WEBHOOK_SECRET（HMAC-SHA256 署名。空なら署名なし）
    timeout_seconds: 10                 # 1 リクエストあたりの HTTP タイムアウト
    max_retries: 3                      # 最大試行回数（4xx はリトライしない）
    retry_backoff_seconds: 1            # リトライ間隔

# ─── ロギング ────────────────────────────────────────────────────────────────

log:
  level: info          # debug / info / warn / error
  format: json         # json（本番推奨） / text（開発・デバッグ時）
  output: stdout       # stdout / syslog
  syslog_tag: smtp-gateway

# ─── 通知メール ──────────────────────────────────────────────────────────────

# 隔離通知・添付ファイル分離通知などシステムが送信するメールの SMTP 設定。
# Postfix を経由させると content_filter ループが発生するため、
# Mailpit や内部 SMTP リレーを直接指定すること。
notification:
  smtp_host: localhost                  # ENV: MAILSHIELD_NOTIFICATION_SMTP_HOST
  smtp_port: 25                         # ENV: MAILSHIELD_NOTIFICATION_SMTP_PORT
  from_address: noreply@mailshield.internal
  # 通知メール SMTP 接続タイムアウト（秒）
  smtp_connect_timeout_seconds: 10
  # 通知メール SMTP 操作全体のデッドライン（秒）
  smtp_deadline_seconds: 30

# ─── 再インジェクト ──────────────────────────────────────────────────────────

# deliver アクション時のデフォルト再インジェクト先。
# Postfix の content_filter なしポートを指定すること（ループ防止）。
# policy ファイルの rules[].destination が指定されている場合はそちらが優先される。
# deliverers.default が定義されている場合はそちらが優先される（本セクションは後方互換）。
reinject:
  host: localhost                       # ENV: MAILSHIELD_REINJECT_HOST
  port: 25                              # ENV: MAILSHIELD_REINJECT_PORT

# ─── 配送トランスポート（deliverers） ─────────────────────────────────────────

# 名前付きの配送先定義。policy の rules[].destination に名前を書くと
# その deliverer 経由で配送される。"default" は予約名で、destination 未指定の
# deliver ルールに使われる（未定義なら reinject.host:port にフォールバック）。
#
# 各 deliverer のパラメータ:
#   type:            smtp（省略時 smtp。現在 smtp のみ対応）
#   host:            接続先ホスト（必須）
#   port:            接続先ポート（省略時 25）
#   tls:             none | starttls | tls（省略時 none）
#   auth.username:   SMTP AUTH ユーザー名（設定すると AUTH を行う。PLAIN/LOGIN 自動選択）
#   auth.password:   SMTP AUTH パスワード
#                    ENV: MAILSHIELD_DELIVERER_<大文字名>_PASSWORD が YAML より優先
#                    （名前のハイフンは _ に変換。例: ses-tokyo → MAILSHIELD_DELIVERER_SES_TOKYO_PASSWORD）
#   tls_skip_verify: TLS 証明書検証をスキップ（開発・テスト用。省略時 false）
#
# 例:
# deliverers:
#   default:                            # destination 未指定のルールで使われる
#     host: postfix
#     port: 25
#   sendgrid:                           # policy で destination: sendgrid と指定
#     host: smtp.sendgrid.net
#     port: 587
#     tls: starttls
#     auth:
#       username: apikey
#       password: ""                    # ENV: MAILSHIELD_DELIVERER_SENDGRID_PASSWORD
#   ses:                                # Amazon SES SMTP エンドポイント
#     host: email-smtp.ap-northeast-1.amazonaws.com
#     port: 587
#     tls: starttls
#     auth:
#       username: AKIAXXXXXXXXXXXXXXXX  # SES SMTP 認証情報
#       password: ""                    # ENV: MAILSHIELD_DELIVERER_SES_PASSWORD
deliverers: {}

# ─── 設定ソース（ADR 008 ③-2） ───────────────────────────────────────────────
# source=db にすると、routes.d ではなく api-server が publish した DB のアクティブ版
# スナップショット（ワーカーインスタンス/ポリシー/ルーティング/変数）からパイプラインを
# 構築し、poll_interval_seconds ごとに差分を検知してアトミックに再構築する。
# source=file（既定）は従来どおり routes.d を使う。
config:
  source: file                    # file | db
  poll_interval_seconds: 10       # db モードのポーリング間隔

# ─── 隔離通知 ────────────────────────────────────────────────────────────────

# quarantine アクション決定時に受信者へ即時通知メールを送信する
quarantine_notification:
  enabled: true
  # 通知メール内「確認する」ボタンの URL（Web UI のベース URL）
  ui_base_url: "http://localhost:3000"

# ─── 承認フロー ──────────────────────────────────────────────────────────────

# policy アクションが approval を返したとき、approval_requests レコードを DB に作成する。
# 承認者の解決順: 送信者の approver_id → 受信者の approver_id → global_approver_email
approval:
  # 承認依頼の有効期限（時間）。0 は 72 時間として扱われる。
  expiry_hours: 72
  # 承認者が解決できなかった場合のフォールバック。空の場合は警告ログのみ出力。
  global_approver_email: ""

# ─── 添付ファイルダウンロード認証 ────────────────────────────────────────────

# ルートの direction ごとにダウンロード認証方式を設定する。
attachment_download:
  flows:
    - match: outbound
      # otp: ダウンロード URL に1回限りのコードを付与（非ログインユーザー向け）
      mode: otp
    - match: inbound
      # auth: ログイン済みかつ allowed_roles に含まれるロールのみ許可
      mode: auth
      allowed_roles: [member, owner, admin]
    - match: internal
      mode: auth
      allowed_roles: [member, owner, admin]

# ─── ワーカーグローバル設定 ──────────────────────────────────────────────────

# workers_dir / worker_config_dir は全ルートで共有する。
workers:
  # Lua ワーカースクリプトのルートディレクトリ。
  # 配下の <worker名>/init.lua を自動ロードする。
  workers_dir: ./workers

  # ワーカー固有設定ファイル（YAML）のディレクトリ。
  # シンプルなワーカー: <worker名>.yaml
  # テンプレート等複数ファイルを持つワーカー: <worker名>/config.yaml
  worker_config_dir: ./config/workers

# ─── ルート定義 ──────────────────────────────────────────────────────────────

# ルートは config/routes.d/*.yaml で管理します（nginx の conf.d/ と同じ方式）。
# ファイル名のアルファベット順に評価されます（first-match-wins）。
# mailshield.yaml / default.yaml には routes: セクションはありません。
#
#   routes.d/00-bounce/    変更不要（バウンス/DSN 専用）
#   routes.d/10-inbound/   route.yaml の match.to を自組織ドメインに変更する
#   routes.d/20-outbound/  route.yaml の match.from を自組織ドメインに変更する
